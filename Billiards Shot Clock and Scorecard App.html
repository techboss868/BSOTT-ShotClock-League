<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billiards Shot Clock & Scorecard</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #00e676;
            --danger-color: #ff1744;
            --text-color: #ffffff;
            --muted-color: #9e9e9e;
            --input-bg: #2c2c2c;
            --border-color: #333;
            --accent-blue: #2979ff;
            --header-bg: #333;
            --total-bg: #263238;
            --win-bg: rgba(0, 230, 118, 0.18);
        }

        [data-theme="light"] {
            --bg-color: #f4f6f8;
            --surface-color: #ffffff;
            --primary-color: #00a152;
            --danger-color: #d50000;
            --text-color: #212121;
            --muted-color: #607d8b;
            --input-bg: #f5f5f5;
            --border-color: #ccc;
            --accent-blue: #2962ff;
            --header-bg: #e0e0e0;
            --total-bg: #eceff1;
            --win-bg: rgba(0, 161, 82, 0.15);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .container { max-width: 1200px; width: 100%; display: grid; gap: 15px; }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: -5px;
            padding: 0 5px;
        }

        .app-title { font-size: 1.1rem; font-weight: bold; letter-spacing: 0.5px; }

        .card {
            background-color: var(--surface-color);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid var(--border-color);
            transition: background-color 0.3s, border-color 0.3s;
        }

        h2, h3 { margin-top: 0; margin-bottom: 10px; }

        .theme-switch { display: inline-block; height: 30px; position: relative; width: 55px; }
        .theme-switch input { display: none; }
        .slider {
            background-color: #ccc; bottom: 0; cursor: pointer; left: 0;
            position: absolute; right: 0; top: 0; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            background-color: #fff; bottom: 3px; content: ""; height: 24px; left: 3px;
            position: absolute; transition: .4s; width: 24px; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(25px); }
        .theme-switch-wrapper { display: flex; align-items: center; }
        .mode-label { margin-right: 10px; font-weight: bold; font-size: 0.9rem; }

        #timer-display {
            font-size: 9rem;
            font-weight: bold;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            margin: 5px 0;
            color: var(--primary-color);
            text-shadow: 0 0 20px rgba(0, 230, 118, 0.2);
            transition: color 0.3s;
            cursor: default;
            user-select: none;
        }
        #timer-display.warning { animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

        .timer-controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

        button {
            border: none; padding: 15px 20px; font-size: 1.2rem; border-radius: 10px;
            cursor: pointer; font-weight: bold; transition: transform 0.1s, opacity 0.2s;
            color: white; flex: 1; min-width: 100px;
            touch-action: manipulation; -webkit-user-select: none; user-select: none;
        }
        button:active { transform: scale(0.96); opacity: 0.9; }

        .btn-start { background-color: var(--primary-color); color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .btn-stop { background-color: var(--danger-color); }
        .btn-reset { background-color: var(--accent-blue); }
        .btn-ext { background-color: #ff9100; color: #000; }
        .btn-export { background-color: #00897b; }
        .btn-print { background-color: #5e35b1; }
        .btn-clear { background-color: #455a64; }

        .footer-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            text-align: left;
        }
        .setting label { display: block; font-size: 0.8rem; color: var(--muted-color); margin-bottom: 4px; font-weight: bold; }

        .teams-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; }
        .team-box input[type="text"] {
            width: 100%; padding: 12px; margin-bottom: 8px;
            background: var(--input-bg); border: 1px solid var(--border-color);
            color: var(--text-color); border-radius: 6px; font-size: 16px;
            transition: background 0.3s, color 0.3s;
        }
        .team-header-input {
            font-size: 1.3rem !important; font-weight: bold;
            background: var(--header-bg) !important; text-align: center; margin-bottom: 15px !important;
        }

        .status-banner {
            font-size: 1.15rem; font-weight: bold; padding: 12px; border-radius: 10px;
            background: var(--total-bg); margin-bottom: 10px;
        }
        .status-banner.win { background: var(--win-bg); color: var(--primary-color); }

        .scorecard-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 760px; }
        th, td { padding: 10px 8px; border: 1px solid var(--border-color); text-align: center; font-size: 1rem; }
        th { background-color: var(--header-bg); color: var(--text-color); }
        td.win-cell { background: var(--win-bg); font-weight: bold; }
        tfoot tr { background-color: var(--total-bg); font-weight: bold; font-size: 1.05rem; }

        select, input[type="number"] {
            background: var(--input-bg); color: var(--text-color);
            border: 1px solid var(--border-color); padding: 10px; border-radius: 4px;
            width: 100%; font-size: 16px;
        }
        .row-tools { display: flex; gap: 4px; justify-content: center; }
        .row-tools button {
            min-width: 0; flex: 0 0 auto; padding: 6px 9px; font-size: 0.85rem;
            background: var(--header-bg); color: var(--text-color);
        }
        .type-select { font-weight: bold; }
        .add-match-btn { background-color: var(--accent-blue); margin-top: 5px; }

        @media (max-width: 768px) {
            #timer-display { font-size: 7rem; }
            .teams-container { grid-template-columns: 1fr; }
            button { padding: 15px 10px; font-size: 1.1rem; }
            .container { gap: 10px; }
        }
        @media (max-width: 480px) {
            #timer-display { font-size: 5.5rem; }
            .card { padding: 10px; }
            h3 { font-size: 1.1rem; }
        }

        /* --- Print / PDF layout --- */
        @media print {
            body { background: #fff; color: #000; padding: 0; }
            .no-print { display: none !important; }
            .card { box-shadow: none; border: none; padding: 0; }
            table { min-width: 0; }
            th, td { border: 1px solid #999; }
            .status-banner { background: #eee; color: #000; }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header-row no-print">
        <span class="app-title">🎱 Shot Clock &amp; Scorecard</span>
        <div class="theme-switch-wrapper">
            <span class="mode-label" id="mode-label-text">Dark Mode</span>
            <label class="theme-switch" for="checkbox">
                <input type="checkbox" id="checkbox" onchange="toggleTheme()">
                <div class="slider"></div>
            </label>
        </div>
    </div>

    <div class="card no-print">
        <h3>SHOT CLOCK</h3>
        <div id="timer-display">45</div>
        <div class="timer-controls">
            <button class="btn-start" onclick="startTimer()">START</button>
            <button class="btn-stop" onclick="stopTimer()">PAUSE</button>
            <button class="btn-reset" onclick="resetTimer()">RESET</button>
            <button class="btn-ext" onclick="addExtension()">EXT (+<span id="ext-label">30</span>s)</button>
        </div>
    </div>

    <div class="card no-print">
        <h3>SETTINGS</h3>
        <div class="settings-grid">
            <div class="setting">
                <label for="set-duration">Shot clock (seconds)</label>
                <input type="number" id="set-duration" min="5" max="180" value="45" oninput="onSettingChange()">
            </div>
            <div class="setting">
                <label for="set-extension">Extension (seconds)</label>
                <input type="number" id="set-extension" min="5" max="120" value="30" oninput="onSettingChange()">
            </div>
            <div class="setting">
                <label for="set-raceto">Race to (matches)</label>
                <input type="number" id="set-raceto" min="1" max="50" value="3" oninput="onSettingChange()">
            </div>
            <div class="setting">
                <label>Sound announcements</label>
                <label class="theme-switch" style="margin-top:4px;">
                    <input type="checkbox" id="set-sound" checked onchange="onSettingChange()">
                    <div class="slider"></div>
                </label>
            </div>
        </div>
    </div>

    <div class="card no-print">
        <h3>TEAM ROSTERS (6 Players)</h3>
        <div class="teams-container">
            <div class="team-box" id="teamA-box">
                <input type="text" id="teamA-name" class="team-header-input" value="Home Team" oninput="onTeamNameChange()">
                <div id="teamA-roster"></div>
            </div>
            <div class="team-box" id="teamB-box">
                <input type="text" id="teamB-name" class="team-header-input" value="Away Team" oninput="onTeamNameChange()">
                <div id="teamB-roster"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>MATCH SCORECARD</h3>
        <div class="status-banner" id="status-banner">Match not started.</div>
        <div class="scorecard-wrapper">
            <table id="scorecard-table">
                <thead>
                    <tr>
                        <th width="8%">#</th>
                        <th width="14%">Type</th>
                        <th width="26%" id="th-teamA">Home Team Players</th>
                        <th width="9%">Pts</th>
                        <th width="9%">Pts</th>
                        <th width="26%" id="th-teamB">Away Team Players</th>
                        <th width="8%" class="no-print">Edit</th>
                    </tr>
                </thead>
                <tbody id="scorecard-body"></tbody>
                <tfoot>
                    <tr>
                        <td colspan="3" style="text-align: right; padding-right: 15px;">MATCHES WON:</td>
                        <td id="won-A">0</td>
                        <td id="won-B">0</td>
                        <td colspan="2"></td>
                    </tr>
                    <tr>
                        <td colspan="3" style="text-align: right; padding-right: 15px;">TOTAL POINTS:</td>
                        <td id="total-A">0</td>
                        <td id="total-B">0</td>
                        <td colspan="2"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
        <button class="add-match-btn no-print" onclick="addMatch()">+ ADD MATCH</button>
        <div class="footer-actions no-print">
            <button class="btn-export" onclick="exportToCSV()">EXPORT CSV</button>
            <button class="btn-print" onclick="window.print()">PRINT / PDF</button>
            <button class="btn-clear" onclick="clearMatch()">CLEAR ALL</button>
        </div>
    </div>
</div>

<script>
    "use strict";

    var STORAGE_KEY = "billiardsAppState_v2";

    var defaultState = function () {
        return {
            theme: "dark",
            duration: 45,
            extension: 30,
            raceTo: 3,
            sound: true,
            teamA: { name: "Home Team", players: ["", "", "", "", "", ""] },
            teamB: { name: "Away Team", players: ["", "", "", "", "", ""] },
            matches: [
                { type: "Singles", a: 0, b: 0, aPlayers: [""], bPlayers: [""] },
                { type: "Singles", a: 0, b: 0, aPlayers: [""], bPlayers: [""] },
                { type: "Doubles", a: 0, b: 0, aPlayers: ["", ""], bPlayers: ["", ""] },
                { type: "Singles", a: 0, b: 0, aPlayers: [""], bPlayers: [""] },
                { type: "Singles", a: 0, b: 0, aPlayers: [""], bPlayers: [""] }
            ]
        };
    };

    var state = defaultState();

    // --- PERSISTENCE ---
    function save() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    }
    function load() {
        try {
            var raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;
            var parsed = JSON.parse(raw);
            if (parsed && parsed.matches && parsed.teamA && parsed.teamB) state = parsed;
        } catch (e) {}
    }

    // --- THEME ---
    function applyTheme() {
        var light = state.theme === "light";
        document.documentElement.setAttribute("data-theme", state.theme);
        document.getElementById("checkbox").checked = light;
        document.getElementById("mode-label-text").textContent = light ? "Light Mode" : "Dark Mode";
    }
    function toggleTheme() {
        state.theme = document.getElementById("checkbox").checked ? "light" : "dark";
        applyTheme();
        save();
    }

    // --- SOUND ---
    function speak(text) {
        if (!state.sound) return;
        if ("speechSynthesis" in window) {
            window.speechSynthesis.cancel();
            var msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.0; msg.pitch = 1;
            window.speechSynthesis.speak(msg);
        }
    }

    // --- SHOT CLOCK ---
    var timeLeft = 45;
    var timerId = null;
    var isRunning = false;
    var display = document.getElementById("timer-display");

    function updateDisplay() {
        display.textContent = timeLeft;
        if (timeLeft <= 10) {
            display.style.color = "var(--danger-color)";
            display.classList.add("warning");
        } else {
            display.style.color = "var(--primary-color)";
            display.classList.remove("warning");
        }
    }
    function startTimer() {
        if (isRunning) return;
        isRunning = true;
        timerId = setInterval(function () {
            if (timeLeft > 0) {
                timeLeft--;
                updateDisplay();
                if (timeLeft === 10) speak("Ten seconds");
                if (timeLeft <= 5 && timeLeft > 0) speak(timeLeft.toString());
                if (timeLeft === 0) {
                    speak("Time violation. Foul. Ball in hand to opponent.");
                    stopTimer();
                }
            } else {
                stopTimer();
            }
        }, 1000);
    }
    function stopTimer() {
        isRunning = false;
        clearInterval(timerId);
        if ("speechSynthesis" in window) window.speechSynthesis.cancel();
    }
    // FIX: reset now pauses instead of auto-starting
    function resetTimer() {
        stopTimer();
        timeLeft = state.duration;
        updateDisplay();
    }
    function addExtension() {
        timeLeft += state.extension;
        updateDisplay();
        speak("Extension granted");
    }

    // --- SETTINGS ---
    function onSettingChange() {
        var d = parseInt(document.getElementById("set-duration").value) || 45;
        var e = parseInt(document.getElementById("set-extension").value) || 30;
        var r = parseInt(document.getElementById("set-raceto").value) || 1;
        state.duration = Math.max(5, d);
        state.extension = Math.max(5, e);
        state.raceTo = Math.max(1, r);
        state.sound = document.getElementById("set-sound").checked;
        document.getElementById("ext-label").textContent = state.extension;
        if (!isRunning) { timeLeft = state.duration; updateDisplay(); }
        renderStatus();
        save();
    }
    function applySettingsInputs() {
        document.getElementById("set-duration").value = state.duration;
        document.getElementById("set-extension").value = state.extension;
        document.getElementById("set-raceto").value = state.raceTo;
        document.getElementById("set-sound").checked = state.sound;
        document.getElementById("ext-label").textContent = state.extension;
    }

    // --- ROSTERS ---
    function renderRosters() {
        ["A", "B"].forEach(function (side) {
            var team = state["team" + side];
            document.getElementById("team" + side + "-name").value = team.name;
            var html = "";
            for (var i = 0; i < 6; i++) {
                html += '<input type="text" id="team' + side + '-p' + i + '" placeholder="Player ' + (i + 1) +
                    '" value="' + escapeAttr(team.players[i] || "") +
                    '" oninput="onPlayerChange(\'' + side + '\',' + i + ')">';
            }
            document.getElementById("team" + side + "-roster").innerHTML = html;
        });
    }
    function onPlayerChange(side, idx) {
        state["team" + side].players[idx] = document.getElementById("team" + side + "-p" + idx).value;
        refreshDropdowns();
        save();
    }
    function onTeamNameChange() {
        state.teamA.name = document.getElementById("teamA-name").value;
        state.teamB.name = document.getElementById("teamB-name").value;
        updateTeamHeaders();
        renderStatus();
        save();
    }
    function updateTeamHeaders() {
        document.getElementById("th-teamA").textContent = (state.teamA.name || "Home Team") + " Players";
        document.getElementById("th-teamB").textContent = (state.teamB.name || "Away Team") + " Players";
    }

    // --- SCORECARD ---
    function playerOptions(side) {
        var players = state["team" + side].players;
        var opts = [];
        for (var i = 0; i < 6; i++) opts.push(players[i] || ("Player " + (i + 1)));
        return opts;
    }

    function renderScorecard() {
        var tbody = document.getElementById("scorecard-body");
        var html = "";
        state.matches.forEach(function (m, r) {
            var homeSelects = buildSelects("A", r, m.aPlayers);
            var awaySelects = buildSelects("B", r, m.bPlayers);
            html +=
                '<tr>' +
                    '<td>' + (r + 1) + '</td>' +
                    '<td><select class="type-select" onchange="onTypeChange(' + r + ', this.value)">' +
                        '<option value="Singles"' + (m.type === "Singles" ? " selected" : "") + '>Singles</option>' +
                        '<option value="Doubles"' + (m.type === "Doubles" ? " selected" : "") + '>Doubles</option>' +
                    '</select></td>' +
                    '<td><div style="display:flex;flex-direction:column;gap:5px;">' + homeSelects + '</div></td>' +
                    '<td><input type="number" min="0" value="' + (m.a || 0) + '" oninput="onScoreChange(' + r + ',\'a\',this.value)"></td>' +
                    '<td><input type="number" min="0" value="' + (m.b || 0) + '" oninput="onScoreChange(' + r + ',\'b\',this.value)"></td>' +
                    '<td><div style="display:flex;flex-direction:column;gap:5px;">' + awaySelects + '</div></td>' +
                    '<td class="no-print"><div class="row-tools">' +
                        '<button title="Move up" onclick="moveMatch(' + r + ',-1)">▲</button>' +
                        '<button title="Move down" onclick="moveMatch(' + r + ',1)">▼</button>' +
                        '<button title="Remove" onclick="removeMatch(' + r + ')">✕</button>' +
                    '</div></td>' +
                '</tr>';
        });
        tbody.innerHTML = html;
        refreshDropdowns();
        renderTotals();
    }

    function buildSelects(side, row, chosen) {
        var count = chosen.length;
        var s = "";
        for (var k = 0; k < count; k++) {
            s += '<select class="team' + side + '-select" data-row="' + row + '" data-side="' + side +
                '" data-slot="' + k + '" onchange="onPlayerSelect(' + row + ',\'' + side + '\',' + k + ',this.value)">' +
                '<option value="">Select Player</option></select>';
        }
        return s;
    }

    function refreshDropdowns() {
        var selects = document.querySelectorAll("#scorecard-body select.teamA-select, #scorecard-body select.teamB-select");
        selects.forEach(function (select) {
            var side = select.getAttribute("data-side");
            var row = parseInt(select.getAttribute("data-row"));
            var slot = parseInt(select.getAttribute("data-slot"));
            var names = playerOptions(side);
            var chosen = state.matches[row][side === "A" ? "aPlayers" : "bPlayers"];
            var current = chosen[slot] || "";
            // Names picked by the OTHER slot in this same match cell (doubles dedupe)
            var taken = chosen.filter(function (v, i) { return i !== slot && v; });

            select.innerHTML = '<option value="">Select Player</option>';
            names.forEach(function (name) {
                var opt = document.createElement("option");
                opt.value = name;
                opt.text = name;
                if (taken.indexOf(name) !== -1 && name !== current) opt.disabled = true;
                select.appendChild(opt);
            });
            select.value = current;
        });
    }

    function onPlayerSelect(row, side, slot, value) {
        var key = side === "A" ? "aPlayers" : "bPlayers";
        state.matches[row][key][slot] = value;
        refreshDropdowns();
        save();
    }
    function onScoreChange(row, key, value) {
        state.matches[row][key] = parseInt(value) || 0;
        renderTotals();
        save();
    }
    function onTypeChange(row, value) {
        var m = state.matches[row];
        m.type = value;
        var want = value === "Doubles" ? 2 : 1;
        m.aPlayers = resizePlayers(m.aPlayers, want);
        m.bPlayers = resizePlayers(m.bPlayers, want);
        renderScorecard();
        save();
    }
    function resizePlayers(arr, want) {
        var out = arr.slice(0, want);
        while (out.length < want) out.push("");
        return out;
    }
    function addMatch() {
        state.matches.push({ type: "Singles", a: 0, b: 0, aPlayers: [""], bPlayers: [""] });
        renderScorecard();
        save();
    }
    function removeMatch(row) {
        if (state.matches.length <= 1) { alert("At least one match is required."); return; }
        state.matches.splice(row, 1);
        renderScorecard();
        save();
    }
    function moveMatch(row, dir) {
        var to = row + dir;
        if (to < 0 || to >= state.matches.length) return;
        var tmp = state.matches[row];
        state.matches[row] = state.matches[to];
        state.matches[to] = tmp;
        renderScorecard();
        save();
    }

    // --- TOTALS & STATUS ---
    function computeStats() {
        var wonA = 0, wonB = 0, ptsA = 0, ptsB = 0;
        state.matches.forEach(function (m) {
            ptsA += m.a || 0; ptsB += m.b || 0;
            if ((m.a || 0) > (m.b || 0)) wonA++;
            else if ((m.b || 0) > (m.a || 0)) wonB++;
        });
        return { wonA: wonA, wonB: wonB, ptsA: ptsA, ptsB: ptsB };
    }
    function renderTotals() {
        var s = computeStats();
        document.getElementById("won-A").textContent = s.wonA;
        document.getElementById("won-B").textContent = s.wonB;
        document.getElementById("total-A").textContent = s.ptsA;
        document.getElementById("total-B").textContent = s.ptsB;
        // highlight the winning score cell per row
        var rows = document.querySelectorAll("#scorecard-body tr");
        rows.forEach(function (row, r) {
            var m = state.matches[r];
            var cells = row.querySelectorAll("td");
            cells[3].classList.toggle("win-cell", (m.a || 0) > (m.b || 0));
            cells[4].classList.toggle("win-cell", (m.b || 0) > (m.a || 0));
        });
        renderStatus(s);
    }
    function renderStatus(s) {
        s = s || computeStats();
        var banner = document.getElementById("status-banner");
        var nameA = state.teamA.name || "Home Team";
        var nameB = state.teamB.name || "Away Team";
        banner.classList.remove("win");
        if (s.wonA >= state.raceTo && s.wonA > s.wonB) {
            banner.textContent = "🏆 " + nameA + " wins the match! (" + s.wonA + "–" + s.wonB + ", race to " + state.raceTo + ")";
            banner.classList.add("win");
        } else if (s.wonB >= state.raceTo && s.wonB > s.wonA) {
            banner.textContent = "🏆 " + nameB + " wins the match! (" + s.wonB + "–" + s.wonA + ", race to " + state.raceTo + ")";
            banner.classList.add("win");
        } else if (s.wonA === 0 && s.wonB === 0) {
            banner.textContent = "Match not started — race to " + state.raceTo + " matches.";
        } else if (s.wonA === s.wonB) {
            banner.textContent = "Tied " + s.wonA + "–" + s.wonB + " (race to " + state.raceTo + ")";
        } else if (s.wonA > s.wonB) {
            banner.textContent = nameA + " leads " + s.wonA + "–" + s.wonB + " (race to " + state.raceTo + ")";
        } else {
            banner.textContent = nameB + " leads " + s.wonB + "–" + s.wonA + " (race to " + state.raceTo + ")";
        }
    }

    // --- CLEAR ALL ---
    function clearMatch() {
        if (!confirm("Clear all scores, players, and settings for a fresh match? This cannot be undone.")) return;
        state = defaultState();
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
        boot();
    }

    // --- CSV EXPORT ---
    function exportToCSV() {
        var nameA = state.teamA.name || "Home Team";
        var nameB = state.teamB.name || "Away Team";
        var csv = "data:text/csv;charset=utf-8,";
        csv += "Match,Type," + q(nameA + " Player(s)") + "," + q(nameA + " Score") + "," + q(nameB + " Score") + "," + q(nameB + " Player(s)") + "\n";
        state.matches.forEach(function (m, r) {
            csv += (r + 1) + "," + m.type + "," + q(m.aPlayers.join(" & ")) + "," + (m.a || 0) + "," + (m.b || 0) + "," + q(m.bPlayers.join(" & ")) + "\n";
        });
        var s = computeStats();
        csv += ",,MATCHES WON," + s.wonA + "," + s.wonB + ",\n";
        csv += ",,TOTAL POINTS," + s.ptsA + "," + s.ptsB + ",\n";
        var link = document.createElement("a");
        link.setAttribute("href", encodeURI(csv));
        link.setAttribute("download", "billiards_scorecard.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // --- HELPERS ---
    function q(v) { return '"' + String(v).replace(/"/g, '""') + '"'; }
    function escapeAttr(v) { return String(v).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;"); }

    // --- BOOT ---
    function boot() {
        applyTheme();
        applySettingsInputs();
        renderRosters();
        updateTeamHeaders();
        renderScorecard();
        timeLeft = state.duration;
        updateDisplay();
    }

    window.onload = function () {
        load();
        boot();
    };
</script>

</body>
</html>
